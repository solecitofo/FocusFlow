<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo FocusFlow - Personalizar con tu diseño -->
  <!-- Forma redondeada (burbuja TDAH-friendly) -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Main shape -->
  <circle cx="100" cy="100" r="80" fill="url(#logoGradient)"/>
  
  <!-- Icon - Flecha focus (personalizar) -->
  <path d="M 100 50 L 140 100 L 100 150 M 140 100 H 60" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
